version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: picking_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: picking_user
      POSTGRES_PASSWORD: picking_pass
      POSTGRES_DB: picking_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U picking_user -d picking_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: picking_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://picking_user:picking_pass@db:5432/picking_db
      SECRET_KEY: supersecretkey-picking-system-2026-isaac-haro
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:8000
    container_name: picking_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
